name: Daily Telegram Digest

on:
  schedule:
    - cron: "0 5 * * *"  # каждый день в 05:00 UTC = 09:00 по Самаре
  workflow_dispatch: {}  # ручной запуск из Actions

jobs:
  run-digest:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      UNBIAS_API_KEY: ${{ secrets.UNBIAS_API_KEY }}
      CMC_API_KEY: ${{ secrets.CMC_API_KEY }}
      APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
      COINGLASS_API_KEY: ${{ secrets.COINGLASS_API_KEY }}
      COINMARKETCAL_API_KEY: ${{ secrets.COINMARKETCAL_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run digest script
        run: |
          export PYTHONPATH="$PYTHONPATH:$(pwd)"
          python digest.py --now
