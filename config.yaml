openai_api_key: ""  # можно оставить пустым, ключ возьмём из переменной окружения

settings:
  ai_provider: "openai"
  ai_model: "llama-3.1-8b-instant"
  output_language: "ru"
  api_timeout: 60
  max_tokens_per_summary: 800
  temperature: 0.3
  max_tokens: 800
  dedup_topics: true
  ollama_base_url: null

  digest_groups:
    - name: "Macro"
      description: "Мировые и макроэкономические новости"
    - name: "Crypto"
      description: "Новости крипторынка"
    - name: "Other"
      description: "Все остальное"
